<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>p5 Shader Effects</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.21.0/dist/lil-gui.umd.min.js"></script>
</head>
<body>
<script>
var img
var sh
var gui
var cfg={
effect:"Grayscale",
amount:1.0,
scale:1.0,
speed:1.0,
export_png:function(){saveCanvas("export","png")},
export_jpg:function(){saveCanvas("export","jpg")},
export_jpeg:function(){saveCanvas("export","jpeg")}
}

function preload(){
img=loadImage("https://archive.org/download/nices-1/nices-1.png")
sh=createShader(vs,fs)
}

function setup(){
createCanvas(1280,720,WEBGL)
noStroke()
gui=new lil.GUI()
gui.add(cfg,"effect",[
"Grayscale","bulge","ripple","pinch","wave","kaleidoscope","hue/saturation",
"g major 1","g major","scary g major","g major 2","g major 5","color green shifter",
"g major 74","g major 7689.3","g major 7684.3","g major 7683.3",
"g major 4","opposite g major 4","x is rage",
"formula01","formula02","formula03","formula04","formula05","formula06","formula07","formula08","formula09","formula10",
"formula11","formula12","formula13","formula14","formula15","formula16","formula17","formula18","formula19","formula20",
"formula21","formula22","formula23","formula24","formula25","formula26","formula27","formula28","formula29","formula30"
])
gui.add(cfg,"amount",0,10,0.01)
gui.add(cfg,"scale",0,10,0.01)
gui.add(cfg,"speed",0,10,0.01)
gui.add(cfg,"export_png")
gui.add(cfg,"export_jpg")
gui.add(cfg,"export_jpeg")
}

function draw(){
shader(sh)
sh.setUniform("tex0",img)
sh.setUniform("resolution",[width,height])
sh.setUniform("time",millis()/1000.0)
sh.setUniform("amount",cfg.amount)
sh.setUniform("scale",cfg.scale)
sh.setUniform("speed",cfg.speed)
sh.setUniform("effectIndex",getEffectIndex(cfg.effect))
rect(-width/2,-height/2,width,height)
}

function getEffectIndex(n){
var list=[
"Grayscale","bulge","ripple","pinch","wave","kaleidoscope","hue/saturation",
"g major 1","g major","scary g major","g major 2","g major 5","color green shifter",
"g major 74","g major 7689.3","g major 7684.3","g major 7683.3",
"g major 4","opposite g major 4","x is rage",
"formula01","formula02","formula03","formula04","formula05","formula06","formula07","formula08","formula09","formula10",
"formula11","formula12","formula13","formula14","formula15","formula16","formula17","formula18","formula19","formula20",
"formula21","formula22","formula23","formula24","formula25","formula26","formula27","formula28","formula29","formula30"
]
for(var i=0;i<list.length;i++)if(list[i]==n)return i
return 0
}

var vs=`
precision mediump float;
attribute vec3 aPosition;
attribute vec2 aTexCoord;
varying vec2 vTex;
void main(){
vTex=aTexCoord;
gl_Position=vec4(aPosition,1.0);
}
`

var fs=`
precision mediump float;
uniform sampler2D tex0;
uniform vec2 resolution;
uniform float time;
uniform float amount;
uniform float scale;
uniform float speed;
uniform int effectIndex;
varying vec2 vTex;

vec3 hueShift(vec3 c,float a){
float s=sin(a);
float co=cos(a);
mat3 m=mat3(
0.299+0.701*co+0.168*s,0.587-0.587*co+0.330*s,0.114-0.114*co-0.497*s,
0.299-0.299*co-0.328*s,0.587+0.413*co+0.035*s,0.114-0.114*co+0.292*s,
0.299-0.3*co+1.25*s,0.587-0.588*co-1.05*s,0.114+0.886*co-0.203*s
);
return clamp(m*c,0.0,1.0);
}

vec2 bulge(vec2 uv){
vec2 c=uv-0.5;
float r=length(c);
uv+=c*(amount*r);
return uv;
}

vec2 pinch(vec2 uv){
vec2 c=uv-0.5;
float r=length(c);
uv-=c*(amount*r);
return uv;
}

vec2 ripple(vec2 uv){
uv.y+=sin(uv.x*20.0*scale+time*speed)*0.02*amount;
return uv;
}

vec2 wave(vec2 uv){
uv.x+=sin(uv.y*15.0*scale+time*speed)*0.03*amount;
return uv;
}

vec2 kale(vec2 uv){
vec2 p=uv-0.5;
float a=atan(p.y,p.x);
float r=length(p);
float seg=6.0;
a=mod(a,6.28318/seg);
a=abs(a-3.14159/seg);
p=r*vec2(cos(a),sin(a));
return p+0.5;
}

vec2 fisheye(vec2 uv,float a){
vec2 c=uv-0.5;
float r=length(c);
uv+=c*r*a;
return uv;
}

vec3 gradient(vec3 c,int mode){
float g=(c.r+c.g+c.b)/3.0;
if(mode==0)return vec3(0.0,0.0,0.0);
if(mode==1)return vec3(1.0);
if(mode==2)return vec3(1.0,0.0,0.0);
return vec3(g);
}

void main(){
vec2 uv=vTex;
vec3 col=texture2D(tex0,uv).rgb;

if(effectIndex==0){
float g=(col.r+col.g+col.b)/3.0;
col=vec3(g);
}

else if(effectIndex==1){
uv=bulge(uv);
col=texture2D(tex0,uv).rgb;
}

else if(effectIndex==2){
uv=ripple(uv);
col=texture2D(tex0,uv).rgb;
}

else if(effectIndex==3){
uv=pinch(uv);
col=texture2D(tex0,uv).rgb;
}

else if(effectIndex==4){
uv=wave(uv);
col=texture2D(tex0,uv).rgb;
}

else if(effectIndex==5){
uv=kale(uv);
col=texture2D(tex0,uv).rgb;
}

else if(effectIndex==6){
col=hueShift(col,amount);
}

else if(effectIndex==7){
col=1.0-col;
col=hueShift(col,3.14159);
}

else if(effectIndex==8){
col=1.0-col;
}

else if(effectIndex==9){
col=1.0-col;
}

else if(effectIndex==10){
col.b=1.0-col.b;
}

else if(effectIndex==11){
col.r=1.0-col.r;
}

else if(effectIndex==12){
col.g=1.0-col.g;
}

else if(effectIndex==13){
col=1.0-col;
col=hueShift(col,3.14159);
uv=fisheye(uv,2.0);
col=texture2D(tex0,uv).rgb;
}

else if(effectIndex==14){
uv=fisheye(uv,-2.0);
col=texture2D(tex0,uv).rgb;
col=hueShift(col,3.14159);
}

else if(effectIndex==15){
uv=fisheye(uv,5.0);
col=texture2D(tex0,uv).rgb;
col=hueShift(col,0.56);
}

else if(effectIndex==16){
uv=fisheye(uv,-5.0);
col=texture2D(tex0,uv).rgb;
col=hueShift(col,0.84);
}

else if(effectIndex==17){
col=gradient(col,0);
}

else if(effectIndex==18){
col=gradient(col,1);
}

else if(effectIndex==19){
col=gradient(col,2);
}

else{
float i=float(effectIndex-20)+1.0;
float f1=sin(uv.x*i*scale+time*speed);
float f2=cos(uv.y*i*scale-time*speed);
float f3=sin((uv.x+uv.y)*i);
float f4=cos((uv.x-uv.y)*i);
col+=vec3(f1,f2,f3)*0.2;
col+=vec3(f4,f1,f2)*0.1;
col=fract(col);
}

gl_FragColor=vec4(col,1.0);
}
`
</script>
</body>
  </html>
