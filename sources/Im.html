<textarea id="funcJS">function f(img){
let {w,h,pic}=img;
let out=[];
for(let y=0;y<h;y++){
 for(let x=0;x<w;x++){
  let r=pic(x/w,y/h,'r'),g=pic(x/w,y/h,'g'),b=pic(x/w,y/h,'b');
  out.push({r,g,b});
 }
}
return out;
}</textarea>

<script>
let img = new Image();
let originalCanvas = document.getElementById("originalCanvas");

let ctxOrig = originalCanvas.getContext("2d");
let ctxMod = modifiedCanvas.getContext("2d");
let imgDataCache = null, imgW = 0, imgH = 0;
let currentColorSpace = 'rgb';
let currentX = 0, currentY = 0;
const sliderConfigs = [
  ['rgb', 'r', 'g', 'b', 0, 0, 0, 255, 255, 255, 255, 255, 255],

  ['yjk', 'y', 'j', 'k', 0, 0, 0, 255, 255, 255, 255, 255, 255],
  ['lab', 'l', 'a', 'b', 0, -127, -127, 150, 127, 127, 100, 127, 127],
  ['uvw', 'u', 'v', 'w', 0, 0, 0, 255, 255, 255, 255, 255, 255],
  ['lms', 'l', 'm', 's', 0, 0, 0, 255, 255, 255, 255, 255, 255],
  ['ydbdr', 'y', 'db', 'dr', 0, -255, -255, 255, 255, 255, 255, 255, 255],
  ['yiq', 'y', 'i', 'q', 0, -0.5957, -0.5226, 1, 0.5957, 0.5226, 1, 1, 1],
  ['ycocg', 'y', 'co', 'cg', 0, -255, -255, 255, 255, 255, 255, 255, 255],
  ['ycocgr', 'y', 'co', 'cg', 0, -255, -255, 255, 255, 255, 255, 255, 255],
  ['yuv', 'y', 'u', 'v', 0, -255, -255, 255, 255, 255, 255, 255, 255],
  ['ypbpr', 'y', 'pb', 'pr', 0, -255, -255, 255, 255, 255, 255, 255, 255],
  ['bt', 'y', 'cb', 'cr', 0, -128, -128, 255, 127, 127, 255, 255],  // BT.709 (Rec. 709)
  ['bt2020', 'y', 'cb', 'cr', 0, -128, -128, 255, 127, 127, 255, 255], // BT.2020

   ['pqlms', 'l', 'm', 's', 0, 0, 0, 255, 255, 255, 255, 255, 255],
   ['hlglms', 'l', 'm', 's', 0, 0, 0, 255, 255, 255, 255, 255, 255],
    ['pqxyz', 'x', 'y', 'z', 0, 0, 0, 255, 255, 255, 255, 255, 255],
     ['hlgxyz', 'x', 'y', 'z', 0, 0, 0, 255, 255, 255, 255, 255, 255],
     ['ictcp', 'i', 'ct', 'cp', 0, -128, -128, 255, 127, 127, 255, 127, 127],
      ['hlgictcp', 'i', 'ct', 'cp', 0, -128, -128, 255, 127, 127, 255, 127, 127],
    ['ictcpqc2', 'i', 'ct', 'cp', 0, -128, -128, 255, 127, 127, 255, 127, 127],
];


const sliders = {};
const colorSpaces = [];

for (const [space, ch1, ch2, ch3] of sliderConfigs) {
  sliders[space] = [`${ch1}Slider`, `${ch2}Slider`, `${ch3}Slider`];
  if (!colorSpaces.includes(space)) {
    colorSpaces.push(space);
  }
}

// Global cache for color space conversions to speed up JS functions
let conversionCache = {};

// Initialize color space dropdown
function initColorSpaces() {
    const select = document.getElementById('colorSpace');
    colorSpaces.forEach(space => {
        const option = document.createElement('option');
        option.value = space;
        option.textContent = space;
        select.appendChild(option);
    });
}

// Update the inputs based on selected color space
function updateColorSpace() {
    currentColorSpace = document.getElementById("colorSpace").value;
    const config = sliderConfigs.find(c => c[0] === currentColorSpace);
    if (!config) return;
    
    const container = document.getElementById('channelInputs');
    container.innerHTML = '';
    
    for (let i = 0; i < 3; i++) {
        const channel = config[i+1];
        
        const div = document.createElement('div');
        div.className = 'channel-input';
        
        const label = document.createElement('label');
        label.textContent = channel + ':';
        div.appendChild(label);
        
        const input = document.createElement('input');
        input.type = 'text';
        input.id = `func_${channel}`;
        input.value = channel;
        div.appendChild(input);
        
        container.appendChild(div);
    }
}

// Convert from RGB to target color space and normalize to 0-1
function toColorSpace(r, g, b, space) {
    const cacheKey = `${r},${g},${b},${space}`;
    if (conversionCache[cacheKey]) return conversionCache[cacheKey];

    if (space === 'rgb') return {r: r/255, g: g/255, b: b/255};
    
    const converter = window[`rgbTo${space.charAt(0).toUpperCase() + space.slice(1)}`];
    if (!converter) return {r: r/255, g: g/255, b: b/255};
    
    const converted = converter(r, g, b);
    const config = sliderConfigs.find(c => c[0] === space);
    if (!config) return {
        [config[1]]: converted[0]/255,
        [config[2]]: converted[1]/255,
        [config[3]]: converted[2]/255
    };
    
    const result = {
        [config[1]]: (converted[0] - config[4]) / (config[7] - config[4]),
        [config[2]]: (converted[1] - config[5]) / (config[8] - config[5]),
        [config[3]]: (converted[2] - config[6]) / (config[9] - config[6])
    };
    conversionCache[cacheKey] = result;
    return result;
}

// Convert from normalized color space back to RGB
function fromColorSpace(vals, space) {
    if (space === 'rgb') {
        return [
            Math.min(255, Math.max(0, vals.r * 255)),
            Math.min(255, Math.max(0, vals.g * 255)),
            Math.min(255, Math.max(0, vals.b * 255))
        ];
    }
    
    const config = sliderConfigs.find(c => c[0] === space);
    if (!config) return [
        Math.min(255, Math.max(0, vals[config[1]] * 255)),
        Math.min(255, Math.max(0, vals[config[2]] * 255)),
        Math.min(255, Math.max(0, vals[config[3]] * 255))
    ];
    
    // Denormalize values
    const denormalized = [
        vals[config[1]] * (config[7] - config[4]) + config[4],
        vals[config[2]] * (config[8] - config[5]) + config[5],
        vals[config[3]] * (config[9] - config[6]) + config[6]
    ];
    
    const converter = window[`${space}ToRgb`];
    if (!converter) return [
        Math.min(255, Math.max(0, denormalized[0] * 255)),
        Math.min(255, Math.max(0, denormalized[1] * 255)),
        Math.min(255, Math.max(0, denormalized[2] * 255))
    ];
    
    return converter(...denormalized);
}

// Helper functions for math expressions
math.import({
    avrg: (a, b, c) => (a + b + c) / 3,
    mix: (a, b, t) => a * (1 - t) + b * t,
    clip: x => Math.min(255, Math.max(0, x)),
    sat: x => Math.min(1, Math.max(0, x)),
    norm2: (x, min, max) => (x - min) / (max - min),
    inv2: x => 255 - x,
    wrap: (x, min, max) => {
        const range = max - min;
        return ((x - min) % range + range) % range + min;
    },
    y: (r, g, b) => 0.299 * r + 0.587 * g + 0.114 * b,
    cb: (r, g, b) => 128 - 0.168736 * r - 0.331264 * g + 0.5 * b,
    cr: (r, g, b) => 128 + 0.5 * r - 0.418688 * g - 0.081312 * b
});

function pic(x, y, what) {
    let px = Math.floor(x * imgW);
    let py = Math.floor(y * imgH);
    if (px < 0 || px >= imgW || py < 0 || py >= imgH) return 0;
    let index = (py * imgW + px) * 4;
    let r = imgDataCache[index] / 255;
    let g = imgDataCache[index + 1] / 255;
    let b = imgDataCache[index + 2] / 255;
    let values = {
        r, g, b, 
        avg: (r+ g+ b)/3,
    };
    return values[what] ?? 0;
}
math.import({pic});

function picN(dx, dy, c) {
    return pic((currentX + dx) / imgW, (currentY + dy) / imgH, c);
}
math.import({picN});

// Wrapper for JS functions to get pixels in a specific color space
function picColor(x, y, space) {
    let px = Math.floor(x * imgW);
    let py = Math.floor(y * imgH);
    if (px < 0 || px >= imgW || py < 0 || py >= imgH) return null;
    let index = (py * imgW + px) * 4;
    let r = imgDataCache[index];
    let g = imgDataCache[index + 1];
    let b = imgDataCache[index + 2];
    return toColorSpace(r, g, b, space);
}


document.getElementById("upload").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (file) {
        let reader = new FileReader();
        reader.onload = function(ev) {
            img.onload = function() {
                imgW = img.width;
                imgH = img.height;
                originalCanvas.width = imgW;
                originalCanvas.height = imgH;
                modifiedCanvas.width = imgW;
                modifiedCanvas.height = imgH;
                ctxOrig.drawImage(img, 0, 0);
                imgDataCache = ctxOrig.getImageData(0, 0, imgW, imgH).data;
                conversionCache = {}; // Clear cache on new image
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }
});

function applyTransform() {
    if (!imgDataCache) return;
    
    let bwMode = document.getElementById("bwMode").checked;
    let jsMode = document.getElementById("jsMode").checked;
    let imgData = ctxOrig.getImageData(0, 0, imgW, imgH);
    let data = imgData.data;
    
    if (jsMode) {
        let f = eval("(" + document.getElementById("funcJS").value + ")");
        let res = f({w: imgW, h: imgH, pic, picColor, fromColorSpace});
        let i = 0;
        for (let y = 0; y < imgH; y++) {
            for (let x = 0; x < imgW; x++) {
                let c = res[i++];
                data[(y * imgW + x) * 4] = Math.min(255, Math.max(0, c.r * 255));
                data[(y * imgW + x) * 4 + 1] = Math.min(255, Math.max(0, c.g * 255));
                data[(y * imgW + x) * 4 + 2] = Math.min(255, Math.max(0, c.b * 255));
            }
        }
    } else if (bwMode) {
        for (let y = 0; y < imgH; y++) {
            for (let x = 0; x < imgW; x++) {
                currentX = x;
                currentY = y;
                let index = (y * imgW + x) * 4;
                let r = imgDataCache[index] / 255;
                let g = imgDataCache[index + 1] / 255;
                let b = imgDataCache[index + 2] / 255;
                
                let intensity = math.evaluate(
                    document.getElementById("funcBW").value,
                    {
                        x: x / imgW,
                        y: y / imgH,
                        r, g, b,
                        avg: (r+g+b)/3,
                    }
                );
                let gray = Math.min(255, Math.max(0, intensity * 255));
                data[index] = data[index + 1] = data[index + 2] = gray;
            }
        }
    } else {
        for (let y = 0; y < imgH; y++) {
            for (let x = 0; x < imgW; x++) {
                currentX = x;
                currentY = y;
                let index = (y * imgW + x) * 4;
                
                let r = imgDataCache[index];
